services:
  postgres:
    image: postgres:16
    container_name: beeai_postgres
    environment:
      POSTGRES_DB: beeai
      POSTGRES_USER: beeai_user
      POSTGRES_PASSWORD: suasenha123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeai_user -d beeai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: beeai_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Overrides DATABASE_URL from .env to use the postgres service hostname
      DATABASE_URL: postgresql://beeai_user:suasenha123@postgres:5432/beeai
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: beeai_frontend
    ports:
      - "3000:3000"
    environment:
      # Browser fetches the backend through the mapped port, so localhost works
      NEXT_PUBLIC_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  frontend_node_modules:
