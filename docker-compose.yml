services:
  postgres:
    image: postgres:16
    container_name: beeai_postgres
    environment:
      POSTGRES_DB: beeai
      POSTGRES_USER: beeai_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beeai_dev_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeai_user -d beeai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: beeai_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://beeai_user:${POSTGRES_PASSWORD:-beeai_dev_local}@postgres:5432/beeai
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: beeai_frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: http://backend:5000
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: beeai_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data:
